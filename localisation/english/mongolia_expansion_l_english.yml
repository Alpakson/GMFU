 ##EVENT
  IOG_MONGOLIA.1.t:0 "A New Leader for Mongolia"
  IOG_MONGOLIA.1.d:0 "We need to decide who will lead our great nation into the future!"
  IOG_MONGOLIA.1.a:0 "[MON_mao_zedong.GetName]"
  IOG_MONGOLIA.1.b:0 "[MON_p_krishna_pillai.GetName]"
  IOG_MONGOLIA.1.c:0 "[MON_ilyas_zhansugurov.GetName]"
  
  IOG_MONGOLIA.2.t:0 "A Model Soviet State"
  IOG_MONGOLIA.2.d:0 "The transformation of our nation is undeniable. Where once there was only the silence of the steppe and the slow rhythm of nomadic life, now the clamor of industry rings out. With the aid of our Soviet comrades, we have electrified the cities, collectivized the herds, and forged a modern army from the iron of the earth.\n\nThe elders may miss the warm, quiet days of the past, but that season has passed. The summer of our isolation is ending; a new, steel-hard era has begun. We stand as a shining example of what socialism can achieve in Asia."
  IOG_MONGOLIA.2.a:0 "Konchitsya leto"
  
