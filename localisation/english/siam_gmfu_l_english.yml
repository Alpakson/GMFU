 ### Ideas ###
 SIA_royal_police_helper:0 "Expanded Royal Police"
 SIA_royal_police_helper_desc:0 "The Royal Police has been significantly expanded to maintain internal security and counter espionage, though at the cost of some political freedoms."
 
 SIA_suppress_opposition_helper:0 "Opposition Suppressed"
 SIA_suppress_opposition_helper_desc:0 "Democratic and communist opposition has been crushed, ensuring stability and party loyalty at the expense of personal freedoms."
 
 SIA_abolish_autonomy_helper:0 "Centralized Administration"
 SIA_abolish_autonomy_helper_desc:0 "Regional autonomy has been abolished, centralizing all power in Bangkok, though resistance in newly occupied territories has increased."
 
 SIA_kingdom_restored_helper_1:0 "Kingdom Restored"
 SIA_kingdom_restored_helper_1_desc:0 "The restoration of the monarchy has strengthened our military effectiveness and national resolve."
 
 SIA_kingdom_restored_helper_2:0 "Kingdom Restored - Enhanced"
 SIA_kingdom_restored_helper_2_desc:0 "Absolute loyalty to the restored kingdom provides greater conscription and war support."
 
 SIA_kingdom_restored_helper_3:0 "Kingdom Restored - Divine Rule"
 SIA_kingdom_restored_helper_3_desc:0 "Divine kingship grants our forces unparalleled strength and national unity."
 
 SIA_militarism_grace:0 "Militarist Grace Period"
 SIA_militarism_grace_desc:0 "The military's increased influence has temporarily boosted stability and war support, though political tensions remain."
 
 SIA_royal_mountain_idea:0 "Mountain Warfare Specialists"
 SIA_royal_mountain_idea_desc:0 "Our mountaineer units are cheaper to design and contribute less to special forces cap, allowing for larger elite formations."
 
 SIA_royal_marines_idea:0 "Royal Marine Corps"
 SIA_royal_marines_idea_desc:0 "Elite marine units specialize in amphibious operations and coastal assaults."
 
 SIA_fleet_commerce_raiding:0 "Commerce Raiding Fleet"
 SIA_fleet_commerce_raiding_desc:0 "Our submarine fleet is optimized for commerce raiding and convoy interdiction operations."
 
 SIA_curtail_nobles_timed:0 "Curtailing Noble Power"
 SIA_curtail_nobles_timed_desc:0 "Our efforts to reduce noble influence have temporarily destabilized the political situation, causing unrest and economic disruption."
 
 ### Dynamic Modifiers ###
 SIA_thai_army_dynamic:0 "Thai Royal Army Bonuses"
 SIA_thai_army_dynamic_desc:0 "Accumulated military reforms and training improvements."
 
 SIA_thai_industry_dynamic:0 "Thai Industrial Development Bonuses"
 SIA_thai_industry_dynamic_desc:0 "Accumulated industrial and economic improvements."
 
 SIA_thai_navy_dynamic:0 "Royal Thai Navy Bonuses"
 SIA_thai_navy_dynamic_desc:0 "Accumulated naval modernization and doctrinal improvements."
 
 SIA_thai_air_dynamic:0 "Royal Thai Air Force Bonuses"
 SIA_thai_air_dynamic_desc:0 "Accumulated air force improvements and tactical developments."
 
 ### National Focuses ###
 SIA_royal_police_expansion:0 "Expand the Royal Police"
 SIA_royal_police_expansion_desc:0 "To maintain order and prevent political unrest, we must significantly expand our police apparatus. The Royal Police will be key to the monarchy's stability."
 SIA_suppress_opposition:0 "Suppress the Opposition"
 SIA_suppress_opposition_desc:0 "Democratic activists and communists pose a threat to our absolutist order. It is time to put an end to their activities."
 
 SIA_abolish_regional_autonomy:0 "Abolish Regional Autonomy"
 SIA_abolish_regional_autonomy_desc:0 "Local princes and regional rulers have enjoyed autonomy for too long. All power must flow from Bangkok."
 
 SIA_royal_commissioners:0 "Royal Commissioners"
 SIA_royal_commissioners_desc:0 "We will appoint royal commissioners to directly manage provinces on behalf of the monarch, ensuring full central control."
 
 SIA_cult_of_monarchy:0 "Cult of Monarchy"
 SIA_cult_of_monarchy_desc:0 "The Chakri Dynasty must become the center of our national identity. Through propaganda and education, we will strengthen loyalty to the throne."
 
 SIA_divine_kingship:0 "Divine Kingship"
 SIA_divine_kingship_desc:0 "We will return to the ancient concept of Devaraja - the king as an incarnation of divinity, as in the golden age of Ayutthaya."
 
 SIA_thai_language_enforcement:0 "Enforce Thai Language"
 SIA_thai_language_enforcement_desc:0 "Ethnic minorities must adopt Thai as their primary language. This is a crucial step in building a unified Thai nation."
 
 SIA_siamese_education_system:0 "Siamese Education System"
 SIA_siamese_education_system_desc:0 "We will reform the education system, introducing compulsory schooling with a nationalist curriculum glorifying Thai history and culture."
 
 SIA_unify_tai_peoples:0 "Unify the Tai Peoples"
 SIA_unify_tai_peoples_desc:0 "All Tai peoples - in Burma, Laos, and other countries - are part of our nation. The time has come to unite them under one banner."
 
 SIA_greater_siam_doctrine:0 "Greater Siam Doctrine"
 SIA_greater_siam_doctrine_desc:0 "We will develop a military doctrine focused on reclaiming all lost territories and building an empire equal to ancient Ayutthaya."
 
 SIA_new_ayutthaya:0 "New Ayutthaya"
 SIA_new_ayutthaya_desc:0 "Like a phoenix from the ashes, we will be reborn as New Ayutthaya - the most powerful state in Southeast Asia, worthy successor to the great kingdom."
 
 SIA_state_controlled_economy:0 "State-Controlled Economy"
 SIA_state_controlled_economy_desc:0 "To prepare for the coming war, we must increase state control over the economy and industry."
 
 SIA_war_bonds:0 "War Bonds"
 SIA_war_bonds_desc:0 "We will issue war bonds to finance the expansion of our armed forces. The nation must support the military effort."
 
 SIA_royal_military_academy:0 "Royal Military Academy"
 SIA_royal_military_academy_desc:0 "Expansion and modernization of the Chulachomklao Royal Military Academy will provide us with well-trained officers for the coming campaigns."
 
 SIA_japanese_military_advisors:0 "Japanese Military Advisors"
 SIA_japanese_military_advisors_desc:0 "Japan is a model of modern military power in Asia. We will invite their advisors to help us modernize our doctrines."
 
 SIA_experienced_volunteers:0 "Experienced Volunteers"
 SIA_experienced_volunteers_desc:0 "Our volunteers are gaining valuable combat experience in China, which will prove useful in future campaigns."
 
 SIA_deepen_japanese_ties:0 "Deepen Japanese Ties"
 SIA_deepen_japanese_ties_desc:0 "Our support in China earns us Japan's favor and opens doors to technology sharing."
 
 SIA_veteran_officers_return:0 "Return of Veterans"
 SIA_veteran_officers_return_desc:0 "Officers returning from China bring valuable lessons from the battlefield that will improve our army."
 
 SIA_military_observers:0 "Military Observers"
 SIA_military_observers_desc:0 "We will send military observers to study Japanese tactics in action."
 
 SIA_axis_cooperation:0 "Axis Cooperation"
 SIA_axis_cooperation_desc:0 "Our support for Japan opens doors to a greater alliance with the Axis powers."

 ### National Spirits ###
 SIA_royal_police:0 "Royal Police"
 SIA_royal_police_desc:0 "An expanded police apparatus controls every aspect of social life, suppressing all signs of discontent."
 
 SIA_suppressed_opposition:0 "Suppressed Opposition"
 SIA_suppressed_opposition_desc:0 "Democratic activists and communists have been forced underground or silenced, ensuring regime stability."
 
 SIA_centralized_administration:0 "Centralized Administration"
 SIA_centralized_administration_desc:0 "Regional autonomy has been eliminated, and all power flows directly from Bangkok."
 
 SIA_royal_commissioners_idea:0 "Royal Commissioners"
 SIA_royal_commissioners_idea_desc:0 "Commissioners appointed by the king manage provinces, maximizing resource utilization for the state."
 
 SIA_divine_kingship_idea:0 "Divine Monarch"
 SIA_divine_kingship_idea_desc:0 "The king is perceived as a divine ruler, making any opposition to his will sacrilege."
 
 SIA_language_enforcement:0 "Thai Language Enforcement"
 SIA_language_enforcement_desc:0 "Assimilation policies force minorities to abandon their languages in favor of Thai."
 
 SIA_pan_tai_ideology:0 "Pan-Tai Ideology"
 SIA_pan_tai_ideology_desc:0 "We believe in uniting all Tai peoples under the single banner of Siam."
 
 SIA_greater_siam_military:0 "Greater Siam Doctrine"
 SIA_greater_siam_military_desc:0 "Our armed forces have been trained in the doctrine of aggressively reclaiming lost territories."
 
 SIA_new_ayutthaya_idea:0 "New Ayutthaya"
 SIA_new_ayutthaya_idea_desc:0 "We have been reborn as New Ayutthaya, worthy successor to the greatest kingdom in Southeast Asian history."
 
 SIA_state_economy:0 "State Economy"
 SIA_state_economy_desc:0 "The state exercises strict control over the economy, directing resources to war needs."
 
 SIA_military_academy:0 "Royal Military Academy"
 SIA_military_academy_desc:0 "The modernized military academy provides us with excellently trained officers."
 
 SIA_japanese_advisors:0 "Japanese Advisors"
 SIA_japanese_advisors_desc:0 "Japanese military instructors help us modernize our doctrines and tactics."
 
 SIA_experienced_volunteers_idea:0 "Experienced Volunteers"
 SIA_experienced_volunteers_idea_desc:0 "Our volunteers fighting in China are gaining invaluable combat experience."
 
 SIA_veteran_officers:0 "Veteran Officers"
 SIA_veteran_officers_desc:0 "Officers who returned from China bring practical knowledge from the battlefield."
 
 SIA_axis_aligned:0 "Axis Aligned"
 SIA_axis_aligned_desc:0 "Our cooperation with Japan has aligned us with the Axis powers."

